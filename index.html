<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة منهل LMS - الإصدار التعليمي الشامل</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --winji-blue: #2c3e50;
            --winji-accent: #3498db;
            --winji-success: #27ae60;
            --shimmer-color: rgba(255, 255, 255, 0.2);
        }

        body { font-family: 'Cairo', sans-serif; background: #f0f3f6; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* الشيمر الاحترافي */
        .shimmer-btn {
            position: relative; overflow: hidden; background: var(--winji-accent);
            color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer;
        }
        .shimmer-btn::after {
            content: ''; position: absolute; top: -50%; left: -150%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, var(--shimmer-color), transparent);
            transform: rotate(45deg); animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { left: -150%; } 100% { left: 150%; } }

        /* واجهة المستخدم (UI) */
        .sidebar { width: 280px; background: var(--winji-blue); color: white; transition: 0.3s; }
        .nav-link { padding: 18px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; border-right: 4px solid transparent; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); border-right-color: var(--winji-accent); }

        .main-panel { flex: 1; overflow-y: auto; padding: 40px; }
        .glass-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; }

        /* نظام الجداول والصفوف */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .data-table th { background: #f8f9fa; padding: 15px; border-bottom: 2px solid #ddd; }
        .data-table td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="padding:40px 20px; text-align:center;">
            <i class="fas fa-university fa-3x" style="color:var(--winji-accent)"></i>
            <h2>مـنـهـل LMS</h2>
        </div>
        <div class="nav-link active" onclick="switchTab('home')"><i class="fas fa-th-large"></i> لوحة التحكم</div>
        <div class="nav-link" onclick="switchTab('students')"><i class="fas fa-user-graduate"></i> إدارة الطلاب</div>
        <div class="nav-link" onclick="switchTab('classes')"><i class="fas fa-layer-group"></i> الصفوف والمسارات</div>
        <div class="nav-link" onclick="switchTab('exams')"><i class="fas fa-pen-nib"></i> مركز الاختبارات</div>
        <div class="nav-link" onclick="switchTab('settings')"><i class="fas fa-cogs"></i> إعدادات المدرسة</div>
    </div>

    <div class="main-panel">
        <div id="home-tab" class="tab-content">
            <div class="glass-card">
                <h1>أهلاً بك في نظام مـنـهـل الذكي</h1>
                <p>إدارة شاملة للمدرسة بنقرة واحدة.</p>
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-top:30px;">
                    <div class="glass-card" style="border-top: 4px solid var(--winji-accent);">
                        <h3>الطلاب النشطين</h3>
                        <h2>450</h2>
                    </div>
                    <div class="glass-card" style="border-top: 4px solid var(--winji-success);">
                        <h3>المعلمون</h3>
                        <h2>32</h2>
                    </div>
                    <div class="glass-card" style="border-top: 4px solid orange;">
                        <h3>الفصول المفتوحة</h3>
                        <h2>12</h2>
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <h3>🔍 البحث السريع عن طالب (بالاسم أو الرقم التسلسلي)</h3>
                <input type="text" id="studentSearch" onkeyup="searchStudent()" placeholder="ادخل بيانات الطالب هنا..." style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd;">
                <div id="searchResults" style="margin-top:20px;"></div>
            </div>
        </div>

        <div id="classes-tab" class="tab-content" style="display:none;">
            <div class="glass-card">
                <h3>إضافة صف ومسار جديد</h3>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="className" placeholder="اسم الصف">
                    <input type="text" id="section" placeholder="الشعبة">
                    <select id="track">
                        <option>عام</option>
                        <option>متقدم</option>
                        <option>نخبة</option>
                    </select>
                    <button class="shimmer-btn" onclick="addClass()">حفظ الصف</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(tab + '-tab').style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // منطق البحث والبيانات سيتم ربطه بـ Firebase في الخطوة التالية
        function searchStudent() {
            let query = document.getElementById('studentSearch').value;
            // محاكاة نتائج
            if(query.length > 2) {
                document.getElementById('searchResults').innerHTML = `<div class="glass-card">نتائج البحث عن: ${query}</div>`;
            }
        }
    </script>
</body>
</html>
