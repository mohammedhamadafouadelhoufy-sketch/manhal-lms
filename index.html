<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة منهل LMS | الإدارة السحابية</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* تأثير الشيمر (Shimmer Effect) */
        .btn-shimmer {
            position: relative;
            overflow: hidden;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-shimmer::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 100% { left: 100%; } }

        /* Sidebar القائمة الجانبية */
        .sidebar {
            width: 260px;
            background: var(--primary);
            color: white;
            position: fixed;
            height: 100%;
            right: 0;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }
        .nav-item {
            padding: 15px 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.1);
            border-right: 4px solid var(--accent);
        }

        /* Content المحتوى */
        .main-content {
            margin-right: 260px;
            width: calc(100% - 260px);
            padding: 40px;
        }
        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="padding:30px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.1);">
            <i class="fas fa-graduation-cap fa-3x"></i>
            <h2>منهل LMS</h2>
        </div>
        <div class="nav-item active" onclick="showPage('dash')"><i class="fas fa-chart-line"></i> لوحة التحكم</div>
        <div class="nav-item" onclick="showPage('students')"><i class="fas fa-user-plus"></i> إضافة طلاب</div>
        <div class="nav-item" onclick="showPage('view')"><i class="fas fa-users"></i> عرض الطلاب</div>
    </div>

    <div class="main-content">
        <div id="dash" class="page">
            <div class="card">
                <h1>أهلاً بك في نظام منهل السحابي</h1>
                <p>النظام مرتبط الآن بقاعدة بيانات Google Cloud في قطر.</p>
            </div>
        </div>

        <div id="students" class="page" style="display:none;">
            <div class="card">
                <h3>تسجيل طالب جديد في السحابة</h3>
                <input type="text" id="sName" placeholder="اسم الطالب الكامل">
                <input type="text" id="sID" placeholder="الرقم التسلسلي (ID)">
                <button class="btn-shimmer" onclick="saveToFirebase()">حفظ في Firebase</button>
            </div>
        </div>

        <div id="view" class="page" style="display:none;">
            <div class="card">
                <h3>قائمة الطلاب من السحابة</h3>
                <div id="studentList">جاري تحميل البيانات...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // إعداداتك الخاصة التي زودتني بها
        const firebaseConfig = {
          apiKey: "AIzaSyDZSaUw0nBzvZUlXEhWOAqAMXEadcP0aUc",
          authDomain: "manhal-lms.firebaseapp.com",
          projectId: "manhal-lms",
          storageBucket: "manhal-lms.firebasestorage.app",
          messagingSenderId: "876046035090",
          appId: "1:876046035090:web:39c65e507e462b88375e4b",
          measurementId: "G-99TV6HV5QT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // وظيفة الحفظ في Firestore
        window.saveToFirebase = async () => {
            const name = document.getElementById('sName').value;
            const serial = document.getElementById('sID').value;

            if(!name || !serial) return alert("يرجى ملء كافة الحقول");

            try {
                await addDoc(collection(db, "students"), {
                    name: name,
                    serial: serial,
                    createdAt: new Date()
                });
                alert("تم الحفظ بنجاح في سحابة قطر!");
                document.getElementById('sName').value = "";
                document.getElementById('sID').value = "";
                loadStudents();
            } catch (e) {
                alert("خطأ: " + e.message);
            }
        };

        // وظيفة جلب البيانات
        window.loadStudents = async () => {
            const querySnapshot = await getDocs(collection(db, "students"));
            const listDiv = document.getElementById('studentList');
            listDiv.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                listDiv.innerHTML += `<div class="card" style="margin:5px; border-right:4px solid var(--accent)">
                    <strong>${data.name}</strong> - الرقم: ${data.serial}
                </div>`;
            });
        };

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            if(id === 'view') loadStudents();
        }
    </script>
</body>
</html>
