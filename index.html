<div id="announcements-tab" class="tab-content" style="display:none;">
    <div class="card" style="background: linear-gradient(45deg, #1e272e, #2f3640); color:white;">
        <h3><i class="fas fa-bullhorn"></i> الإعلانات العامة للمدرسة</h3>
        <div id="announcement-list">جاري تحميل التنبيهات...</div>
    </div>
</div>

<div id="gamification-view" class="card" style="border-right: 5px solid #f1c40f;">
    <h3><i class="fas fa-trophy" style="color:#f1c40f"></i> مركز التميز (نقاطي: <span id="userPoints">0</span>)</h3>
    <div class="shimmer-btn" style="background:#27ae60; display:inline-block; padding:5px 15px;">وسام الطالب المثالي 🏅</div>
</div>

<div id="live-tab" class="tab-content" style="display:none;">
    <div class="card">
        <h3><i class="fas fa-video"></i> الفصول الافتراضية الذكية</h3>
        <div class="grid-3">
            <button class="shimmer-btn" onclick="joinMeeting('teams')">انضم عبر MS Teams</button>
            <button class="shimmer-btn" style="background:#5d3fd3" onclick="joinMeeting('bbb')">دخول BigBlueButton</button>
        </div>
    </div>
</div>

<div id="parent-tab" class="tab-content" style="display:none;">
    <div class="card">
        <h3><i class="fas fa-user-shield"></i> متابعة الأبناء</h3>
        <p>عرض سجل الغياب والدرجات الخاص بـ: <span id="childName">...</span></p>
    </div>
</div>

<script type="module">
    // --- إضافة ميزات التقارير والحضور ---
    import { doc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // نظام النقاط (التلعيب)
    window.awardPoints = async (studentDocId, points) => {
        const studentRef = doc(db, "students", studentDocId);
        await updateDoc(studentRef, {
            points: increment(points)
        });
        alert("تمت إضافة النقاط بنجاح!");
    };

    // نظام الحضور والغياب (Attendance)
    window.takeAttendance = async (studentId, status) => {
        await addDoc(collection(db, "attendance"), {
            sID: studentId,
            status: status, // حاضراً، غائباً، متأخراً
            date: new Date().toISOString().split('T')[0]
        });
    }

    // الربط مع MS Teams و BigBlueButton
    window.joinMeeting = (platform) => {
        let url = platform === 'teams' ? "https://teams.microsoft.com/l/meetup-join/..." : "https://demo.bigbluebutton.org/gl/...";
        window.open(url, '_blank');
    };

    // إرسال إشعارات البريد (Email API Simulation)
    window.sendMailNotification = (toEmail, subject, body) => {
        console.log(`إرسال إيميل إلى ${toEmail}: ${subject}`);
        // هنا يمكن ربطها بـ EmailJS أو SendGrid لاحقاً
    };
</script>
